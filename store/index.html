<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Store - Cosmo Rebuild</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/site.css?v=cosmic-v2">
</head>
<body>
  <header><div class="container top"><a class="brand" href="/cosmo-clone/">Cosmo Rebuild</a><nav class="nav"><a href="/cosmo-clone/store/">Store</a><a href="/cosmo-clone/status/">Status</a><a href="/cosmo-clone/supportsys/">Support</a><a href="/cosmo-clone/forums/">Forums</a><a href="/cosmo-clone/discover/">Discover</a></nav><div class="pill">Store hub</div></div></header>
  <main class="container">
    <section class="section">
      <h2>Catalog</h2>
      <p>All products and games in one searchable view.</p>
      <p id="liveStamp">Checking live feed...</p>

      <div class="controls">
        <input id="search" type="search" placeholder="Search product or game (Kane, Liquid, AstroZoom...)">
        <select id="sort">
          <option value="featured">Sort: Featured</option>
          <option value="price-asc">Sort: Price low-high</option>
          <option value="price-desc">Sort: Price high-low</option>
          <option value="name">Sort: Name A-Z</option>
        </select>
        <button class="btn ghost" id="reset" type="button">Reset</button>
      </div>

      <div class="chips" id="chips"></div>
      <div class="grid" id="productGrid"></div>
    </section>
  </main>
  <footer><div class="container">Rendered from shared data files for easy updates. Visual build: cosmic-v2.</div></footer>

  <script src="../assets/data.js?v=cosmic-v2"></script>
  <script src="../assets/app.js?v=cosmic-v2"></script>
  <script>
    function renderCatalog() {
      App.renderProductsGrid("productGrid", {
        chipsId: "chips",
        searchId: "search",
        sortId: "sort",
        resetId: "reset"
      });
      App.initVisuals();
    }

    renderCatalog();
    App.enableLiveData(renderCatalog);
  </script>
</body>
</html>
